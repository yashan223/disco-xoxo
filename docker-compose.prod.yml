version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: disco-xoxo-mongo-prod
    restart: always
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_DATABASE: disco-xoxo
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-changeme}
    networks:
      - disco-net

  redis:
    image: redis:7-alpine
    container_name: disco-xoxo-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - disco-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: production
    container_name: disco-xoxo-api-prod
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
    networks:
      - disco-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
      target: production
    container_name: disco-xoxo-bot-prod
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
      - api
    networks:
      - disco-net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      target: production
    container_name: disco-xoxo-dashboard-prod
    restart: always
    networks:
      - disco-net

  nginx:
    image: nginx:alpine
    container_name: disco-xoxo-proxy
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - dashboard
    networks:
      - disco-net

volumes:
  mongo_data:
  redis_data:

networks:
  disco-net:
    driver: bridge
